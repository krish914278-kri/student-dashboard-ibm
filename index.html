<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Student Productivity Dashboard</title>

<link rel="stylesheet" href="style.css">
 <link rel="shortcut icon" href="favicon.png">

</head>

<body>


<!-- LOGIN PAGE -->

<div id="loginPage" class="login">

<h2>Student Dashboard</h2>

<input id="email" type="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<button onclick="register()">Register</button>

</div>


<!-- DASHBOARD -->

<div id="dashboard" style="display:none;">

<div class="sidebar">

<h2>Dashboard</h2>

<ul>

<li onclick="showSection('todo')">Todo</li>

<li onclick="showSection('attendance')">Attendance</li>

<li onclick="showSection('pomodoro')">Pomodoro</li>

<li onclick="showSection('study')">Study Hours</li>

<li onclick="showSection('calendar')">Calendar</li>

<li onclick="showSection('notes')">Notes</li>

<li onclick="showSection('habit')">Habit Tracker</li>

</ul>

<button onclick="logout()">Logout</button>

<button onclick="darkMode()">Dark Mode</button>

</div>


<div class="main">

<h1 id="welcome"></h1>


<!-- TODO -->

<div id="todo" class="section">

<h2>Todo</h2>

<input id="taskInput">

<button onclick="addTask()">Add</button>

<ul id="taskList"></ul>

</div>


<!-- ATTENDANCE -->

<div id="attendance" class="section hidden">

<h2>Attendance</h2>

<input id="totalClasses" placeholder="Total Classes">

<input id="attendedClasses" placeholder="Attended Classes">

<button onclick="calcAttendance()">Calculate</button>

<p id="attendanceResult"></p>

</div>


<!-- POMODORO -->

<div id="pomodoro" class="section hidden">

<h2>Pomodoro</h2>

<h1 id="pomodoroTime">25:00</h1>

<button onclick="startPomodoro()">Start</button>

<button onclick="stopPomodoro()">Stop</button>

<button onclick="resetPomodoro()">Reset</button>

</div>


<!-- STUDY HOURS -->

<div id="study" class="section hidden">

<h2>Study Hours</h2>

<h1 id="studyTime">00:00:00</h1>

<button onclick="startStudy()">Start</button>
<button onclick="stopStudy()">Stop</button>
<button onclick="resetStudy()">Reset</button>

</div>


<!-- CALENDAR -->

<div id="calendar" class="section hidden">

<h2>Study Calendar</h2>

<button onclick="resetCalendar()">Reset Month</button>

<div id="calendarGrid"></div>

</div>


<!-- NOTES -->

<div id="notes" class="section hidden">

<h2>Notes</h2>

<textarea id="noteBox"></textarea>

<br>

<button onclick="saveNote()">Save</button>

</div>


<!-- HABITS -->

<div id="habit" class="section hidden">

<h2>Habit Tracker</h2>

<input id="habitInput">

<button onclick="addHabit()">Add</button>

<ul id="habitList"></ul>

</div>

</div>

</div>


<script src="index.js"></script>

</body>

</html>
